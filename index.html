<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>吉他和弦指板訓練器</title>
<style>
body { font-family: Arial, "Microsoft JhengHei"; padding:20px; }
select { font-size:18px; padding:6px; margin:5px; }
.info { margin:15px 0; font-size:18px; line-height:1.6; }
.fretboard { overflow-x:auto; border:1px solid #ccc; padding:10px; }
table { border-collapse:collapse; }
th, td {
  min-width:72px;
  height:70px;
  border:1px solid #aaa;
  text-align:center;
  vertical-align:middle;
  font-size:13px;
}
th { background:#eee; }
.stringName { background:#f5f5f5; font-weight:bold; }
.hit {
  color:white;
  border-radius:50%;
  display:inline-block;
  padding:6px 8px;
  min-width:44px;
  line-height:1.2;
  background:#222;
}
.root { background:#d62828; }
.third { background:#2a9d8f; }
.fifth { background:#457b9d; }
.seventh { background:#9d4edd; }
.extension { background:#f77f00; }
.tag { font-size:11px; opacity:.9; }
</style>
</head>

<body>

<h2>吉他和弦指板訓練器</h2>

<label>Key：</label>
<select id="root"></select>

<label>模式：</label>
<select id="mode">
  <option value="chordTone">Chord Tone 全指板和弦音</option>
  <option value="triadShape">Triad Shape 三和弦指型</option>
  <option value="shellChord">Shell Chord 爵士骨架和弦</option>
  <option value="neoSoul">Neo Soul 指形</option>
</select>

<label>根音 / 位置弦：</label>
<select id="rootString">
  <option value="all">全部</option>
  <option value="6">第六弦</option>
  <option value="5">第五弦</option>
  <option value="4">第四弦</option>
  <option value="3">第三弦</option>
</select>

<label>和弦形式：</label>
<select id="chordType"></select>

<div class="info" id="chordInfo"></div>
<div class="fretboard" id="fretboard"></div>

<script>
const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const roots = [
  "C","C# / Db","D","D# / Eb","E","F",
  "F# / Gb","G","G# / Ab","A","A# / Bb","B"
];

const chordTypes = {
  "Major 大三和弦": [0,4,7],
  "Minor 小三和弦": [0,3,7],
  "5 Power Chord": [0,7],
  "sus2": [0,2,7],
  "sus4": [0,5,7],
  "6": [0,4,7,9],
  "m6": [0,3,7,9],
  "7 屬七": [0,4,7,10],
  "maj7 大七": [0,4,7,11],
  "m7 小七": [0,3,7,10],
  "mMaj7 小大七": [0,3,7,11],
  "dim 減三": [0,3,6],
  "dim7 減七": [0,3,6,9],
  "m7b5 半減七": [0,3,6,10],
  "aug 增三": [0,4,8],
  "add9": [0,4,7,14],
  "9": [0,4,7,10,14],
  "m9": [0,3,7,10,14],
  "11": [0,4,7,10,14,17],
  "13": [0,4,7,10,14,17,21]
};

const degreeNames = {
  0:"R", 1:"b2", 2:"2", 3:"b3", 4:"3", 5:"4",
  6:"b5", 7:"5", 8:"#5", 9:"6", 10:"b7", 11:"7",
  14:"9", 17:"11", 21:"13"
};

const guitarStrings = [
  { stringNo:1, name:"1弦 E", note:"E" },
  { stringNo:2, name:"2弦 B", note:"B" },
  { stringNo:3, name:"3弦 G", note:"G" },
  { stringNo:4, name:"4弦 D", note:"D" },
  { stringNo:5, name:"5弦 A", note:"A" },
  { stringNo:6, name:"6弦 E", note:"E" }
];

const neoSoulVoicings = {
  "maj7 大七": [
    { name:"maj7 6弦根音", strings:[6,4,3,2], intervals:[0,11,4,7] },
    { name:"maj7 5弦根音", strings:[5,4,3,2], intervals:[0,7,11,4] }
  ],
  "m7 小七": [
    { name:"m7 6弦根音", strings:[6,4,3,2], intervals:[0,10,3,7] },
    { name:"m7 5弦根音", strings:[5,4,3,2], intervals:[0,7,10,3] }
  ],
  "m9": [
    { name:"m9 6弦根音", strings:[6,4,3,2], intervals:[0,10,14,3] },
    { name:"m9 5弦根音", strings:[5,4,3,2], intervals:[0,10,14,3] }
  ],
  "9": [
    { name:"9 6弦根音", strings:[6,4,3,2], intervals:[0,10,14,4] },
    { name:"9 5弦根音", strings:[5,4,3,2], intervals:[0,10,14,4] }
  ],
  "13": [
    { name:"13 6弦根音", strings:[6,4,3,2], intervals:[0,10,4,9] },
    { name:"13 5弦根音", strings:[5,4,3,2], intervals:[0,10,4,9] }
  ],
  "6": [
    { name:"6 6弦根音", strings:[6,4,3,2], intervals:[0,9,4,7] },
    { name:"6 5弦根音", strings:[5,4,3,2], intervals:[0,7,9,4] }
  ],
  "m6": [
    { name:"m6 6弦根音", strings:[6,4,3,2], intervals:[0,9,3,7] },
    { name:"m6 5弦根音", strings:[5,4,3,2], intervals:[0,7,9,3] }
  ]
};

function normalizeRoot(text) {
  return text.split(" ")[0];
}

function noteIndex(note) {
  return notes.indexOf(note);
}

function getNoteFrom(root, interval) {
  return notes[(noteIndex(root) + interval) % 12];
}

function getFretNote(openNote, fret) {
  return notes[(noteIndex(openNote) + fret) % 12];
}

function getDegree(interval) {
  return degreeNames[interval] || degreeNames[interval % 12] || "?";
}

function getStringData(stringNo) {
  return guitarStrings.find(s => s.stringNo === stringNo);
}

function getClass(degree) {
  if (degree === "R") return "root";
  if (degree === "3" || degree === "b3") return "third";
  if (degree === "5" || degree === "b5" || degree === "#5") return "fifth";
  if (degree === "7" || degree === "b7") return "seventh";
  if (["2","9","11","13","6","4"].includes(degree)) return "extension";
  return "";
}

function populate() {
  roots.forEach(r => root.innerHTML += `<option value="${r}">${r}</option>`);
  Object.keys(chordTypes).forEach(c => chordType.innerHTML += `<option value="${c}">${c}</option>`);
}

function findFretsOnString(openNote, targetNote) {
  let frets = [];
  for (let f = 0; f <= 24; f++) {
    if (getFretNote(openNote, f) === targetNote) frets.push(f);
  }
  return frets;
}

function triadDegrees(intervals) {
  const third = intervals.find(i => i === 3 || i === 4);
  const fifth = intervals.find(i => i === 6 || i === 7 || i === 8);
  if (third === undefined || fifth === undefined) return null;

  return [
    { interval:0, degree:"R" },
    { interval:third, degree:getDegree(third) },
    { interval:fifth, degree:getDegree(fifth) }
  ];
}

function shellDegrees(intervals) {
  const third = intervals.find(i => i === 3 || i === 4);
  const seventh = intervals.find(i => i === 10 || i === 11);
  if (third === undefined || seventh === undefined) return null;

  return [
    { interval:0, degree:"R" },
    { interval:third, degree:getDegree(third) },
    { interval:seventh, degree:getDegree(seventh) }
  ];
}

function buildShapes(rootNote, shapeType, intervals, rootStringValue) {
  let baseDegrees;
  let inversions;

  if (shapeType === "triad") {
    baseDegrees = triadDegrees(intervals);
    if (!baseDegrees) return [];

    inversions = [
      { name:"Root", short:"R.Pos", order:[baseDegrees[0], baseDegrees[1], baseDegrees[2]] },
      { name:"First", short:"1st", order:[baseDegrees[1], baseDegrees[2], baseDegrees[0]] },
      { name:"Second", short:"2nd", order:[baseDegrees[2], baseDegrees[0], baseDegrees[1]] }
    ];
  }

  if (shapeType === "shell") {
    baseDegrees = shellDegrees(intervals);
    if (!baseDegrees) return [];

    inversions = [
      { name:"Shell A", short:"Shell", order:[baseDegrees[0], baseDegrees[1], baseDegrees[2]] },
      { name:"Shell B", short:"Inv", order:[baseDegrees[0], baseDegrees[2], baseDegrees[1]] }
    ];
  }

  const groups = rootStringValue === "all"
    ? [6,5,4,3]
    : [Number(rootStringValue)];

  let shapes = [];

  groups.forEach(lowString => {
    const strings = [lowString, lowString - 1, lowString - 2];
    if (strings.some(s => s < 1)) return;

    inversions.forEach(inv => {
      const anchorString = getStringData(strings[0]);
      const anchorNote = getNoteFrom(rootNote, inv.order[0].interval);
      const anchors = findFretsOnString(anchorString.note, anchorNote);

      anchors.forEach(anchor => {
        let shape = [];
        let valid = true;

        for (let i = 0; i < 3; i++) {
          const sNo = strings[i];
          const sData = getStringData(sNo);
          const targetNote = getNoteFrom(rootNote, inv.order[i].interval);
          const possible = findFretsOnString(sData.note, targetNote)
            .filter(f => Math.abs(f - anchor) <= 5);

          if (!possible.length) {
            valid = false;
            break;
          }

          const fret = possible.sort((a,b) => Math.abs(a-anchor) - Math.abs(b-anchor))[0];

          shape.push({
            stringNo:sNo,
            fret,
            note:targetNote,
            degree:inv.order[i].degree,
            tag:inv.short,
            className:getClass(inv.order[i].degree)
          });
        }

        if (valid) {
          const frets = shape.map(x => x.fret);
          if (Math.max(...frets) - Math.min(...frets) <= 5) shapes.push(shape);
        }
      });
    });
  });

  return shapes;
}

function buildNeoSoulShapes(rootNote, chordName, rootStringValue) {
  const voicings = neoSoulVoicings[chordName];
  if (!voicings) return [];

  let shapes = [];

  voicings.forEach(v => {
    if (rootStringValue !== "all" && Number(rootStringValue) !== v.strings[0]) return;

    const anchorString = getStringData(v.strings[0]);
    const anchorNote = getNoteFrom(rootNote, v.intervals[0]);
    const anchors = findFretsOnString(anchorString.note, anchorNote);

    anchors.forEach(anchor => {
      let shape = [];
      let valid = true;

      for (let i = 0; i < v.strings.length; i++) {
        const sNo = v.strings[i];
        const sData = getStringData(sNo);
        const targetNote = getNoteFrom(rootNote, v.intervals[i]);
        const possible = findFretsOnString(sData.note, targetNote)
          .filter(f => Math.abs(f - anchor) <= 5);

        if (!possible.length) {
          valid = false;
          break;
        }

        const fret = possible.sort((a,b) => Math.abs(a-anchor) - Math.abs(b-anchor))[0];

        shape.push({
          stringNo:sNo,
          fret,
          note:targetNote,
          degree:getDegree(v.intervals[i]),
          tag:v.name,
          className:getClass(getDegree(v.intervals[i]))
        });
      }

      if (valid) {
        const frets = shape.map(x => x.fret);
        if (Math.max(...frets) - Math.min(...frets) <= 5) shapes.push(shape);
      }
    });
  });

  return shapes;
}

function render() {
  const rootNote = normalizeRoot(root.value);
  const modeValue = mode.value;
  const rootStringValue = rootString.value;
  const chordName = chordType.value;
  const intervals = chordTypes[chordName];

  const chordNotes = intervals.map(i => ({
    note:getNoteFrom(rootNote, i),
    degree:getDegree(i)
  }));

  let shapeMap = {};

  if (modeValue === "triadShape") {
    buildShapes(rootNote, "triad", intervals, rootStringValue).forEach(shape => {
      shape.forEach(n => {
        const key = `${n.stringNo}-${n.fret}`;
        if (!shapeMap[key]) shapeMap[key] = [];
        shapeMap[key].push(n);
      });
    });
  }

  if (modeValue === "shellChord") {
    buildShapes(rootNote, "shell", intervals, rootStringValue).forEach(shape => {
      shape.forEach(n => {
        const key = `${n.stringNo}-${n.fret}`;
        if (!shapeMap[key]) shapeMap[key] = [];
        shapeMap[key].push(n);
      });
    });
  }

  if (modeValue === "neoSoul") {
    buildNeoSoulShapes(rootNote, chordName, rootStringValue).forEach(shape => {
      shape.forEach(n => {
        const key = `${n.stringNo}-${n.fret}`;
        if (!shapeMap[key]) shapeMap[key] = [];
        shapeMap[key].push(n);
      });
    });
  }

  chordInfo.innerHTML =
    `<b>${rootNote} ${chordName}</b><br>` +
    `模式：${mode.options[mode.selectedIndex].text}<br>` +
    `音名：${chordNotes.map(x => x.note).join("、")}<br>` +
    `首調：${chordNotes.map(x => x.degree).join("、")}<br>` +
    `範圍：空弦 ～ 第 24 格`;

  let html = `<table><tr><th>弦 / 格</th>`;

  for (let fret = 0; fret <= 24; fret++) {
    html += `<th>${fret === 0 ? "空弦" : fret}</th>`;
  }

  html += `</tr>`;

  guitarStrings.forEach(str => {
    html += `<tr><td class="stringName">${str.name}</td>`;

    for (let fret = 0; fret <= 24; fret++) {
      const key = `${str.stringNo}-${fret}`;
      const note = getFretNote(str.note, fret);

      if (modeValue === "chordTone") {
        const match = chordNotes.find(x => x.note === note);

        if (match) {
          html += `
          <td>
            <span class="hit ${getClass(match.degree)}">
              ${note}<br>${match.degree}
            </span>
          </td>`;
        } else {
          html += `<td></td>`;
        }

      } else {
        if (shapeMap[key]) {
          const item = shapeMap[key][0];

          html += `
          <td>
            <span class="hit ${item.className}">
              ${item.note}<br>${item.degree}<br>
              <span class="tag">${item.tag}</span>
            </span>
          </td>`;
        } else {
          html += `<td></td>`;
        }
      }
    }

    html += `</tr>`;
  });

  html += `</table>`;
  fretboard.innerHTML = html;
}

populate();

root.addEventListener("change", render);
mode.addEventListener("change", render);
rootString.addEventListener("change", render);
chordType.addEventListener("change", render);

render();
</script>

</body>
</html>
